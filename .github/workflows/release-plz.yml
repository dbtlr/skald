name: Release-plz

on:
  workflow_dispatch: {}

env:
  RUST_LOG: release_plz=debug

jobs:
  release-plz-pr:
    name: Create release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install release-plz
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/release-plz/release-plz/releases/latest/download/release-plz-x86_64-unknown-linux-gnu.tar.gz | tar xzf - -C /usr/local/bin
      - name: Run release-plz release-pr (debug)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release-plz release-pr \
            --git-token "$GITHUB_TOKEN" \
            --repo-url "https://github.com/$GITHUB_REPOSITORY" \
            -o json 2>&1 | tee /tmp/release-plz-output.txt
          echo "--- Output ---"
          cat /tmp/release-plz-output.txt

  release-plz-release:
    name: Tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
