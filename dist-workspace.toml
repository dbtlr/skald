[workspace]
members = ["cargo:."]

[dist]
# Pin the cargo-dist version used in CI
cargo-dist-version = "0.28.0"
# CI backend
ci = "github"
# Installers to generate
installers = ["shell", "powershell"]
# Target platforms
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
# Archive formats
unix-archive = ".tar.gz"
windows-archive = ".zip"
# Don't run full builds on PRs, just plan
pr-run-mode = "plan"
# Where installers place binaries
install-path = "CARGO_HOME"
# Don't publish to crates.io
publish-jobs = []
