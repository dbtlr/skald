[workspace]
# Don't publish to crates.io
publish = false
# Create git tags when release PR is merged
git_tag_enable = true
# Don't create GitHub releases (cargo-dist handles this via the tag)
git_release_enable = false
# Tag format — single tag for the whole workspace
git_tag_name = "v{{ version }}"
# Use a single changelog for the whole workspace
changelog_update = true

# Only release the binary crate — skip library crates
[[package]]
name = "skald"
# Include commits from all workspace crates in changelog and change detection
changelog_include = ["skald-core", "skald-providers", "skald-vcs", "skald-platform"]

[[package]]
name = "skald-core"
release = false

[[package]]
name = "skald-providers"
release = false

[[package]]
name = "skald-vcs"
release = false

[[package]]
name = "skald-platform"
release = false

[changelog]
# Protect breaking change commits from being excluded
protect_breaking_commits = true
